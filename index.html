<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Real moments. Real people. A marketplace for authentic human experiences in your city." />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tacto" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <!-- Splashscreens for iOS -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Tacto — Real moments. Real people." />
    <meta property="og:description" content="Buy and sell authentic human experiences in your city." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/og-image.png" />

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <title>Tacto</title>
  </head>
  <body class="overscroll-none">
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.style.cssText = 'margin:0;padding:24px;font-family:monospace;font-size:13px;background:#fff;color:#c00';
        document.body.innerHTML = '<b>ERR:</b> ' + msg + '<br><small>' + (src||'') + ':' + line + '</small>' + (err ? '<pre style="margin-top:8px;font-size:11px;white-space:pre-wrap">' + err.stack + '</pre>' : '');
      };
    </script>
    <!-- SW nuke: runs once per deploy to clear stale service workers and caches -->
    <script>
      (function() {
        var DEPLOY = 'v8';
        if (localStorage.getItem('sw_deploy') !== DEPLOY) {
          localStorage.setItem('sw_deploy', DEPLOY);
          function reload() { window.location.reload(true); }
          var p1 = ('serviceWorker' in navigator)
            ? navigator.serviceWorker.getRegistrations()
                .then(function(rs) { return Promise.all(rs.map(function(r) { return r.unregister(); })); })
                .catch(function() {})
            : Promise.resolve();
          var p2 = window.caches
            ? caches.keys().then(function(ks) { return Promise.all(ks.map(function(k) { return caches.delete(k); })); }).catch(function() {})
            : Promise.resolve();
          Promise.all([p1, p2]).then(reload, reload);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
